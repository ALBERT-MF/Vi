<!DOCTYPE html>
<!-- Pas_04: Edició de vins + medies estrelles + vista mòbil centrada -->
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a1020">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vins">
  <link rel="manifest" href="manifest.json">
  <title>Celler de Vins</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* Fons general de pàgina (visible a l'ordinador) */
    html {
      background: #0d0508;
      min-height: 100%;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a0a0f;
      color: #f0e6ea;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      /* Vista centrada tipus mòbil a l'ordinador */
      max-width: 430px;
      margin: 0 auto;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    /* ===== HEADER ===== */
    header {
      background: #4a1020;
      padding: 20px 16px 16px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      position: relative;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    header p {
      font-size: 0.85rem;
      color: #c9909f;
      margin-top: 4px;
    }

    .btn-back {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: #f0e6ea;
      font-size: 1.3rem;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn-back:active { opacity: 0.6; }

    /* ===== VISTES ===== */
    .vista {
      display: none;
      flex: 1;
      flex-direction: column;
    }
    .vista.activa { display: flex; }

    /* ===== VISTA INICI ===== */
    #view-home main {
      flex: 1;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .titol-seccio {
      font-size: 0.85rem;
      color: #9a7080;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: center;
      margin-bottom: 4px;
    }

    .grid-tipus {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card-tipus {
      border-radius: 16px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.15s;
      border: none;
      color: inherit;
    }
    .card-tipus:active { transform: scale(0.96); }

    .card-tipus .emoji { font-size: 2.8rem; }
    .card-tipus .nom { font-size: 1rem; font-weight: 700; text-align: center; }
    .card-tipus .comptador { font-size: 0.75rem; opacity: 0.7; }

    .negre { background: linear-gradient(135deg, #3d0e1a, #6b1a2e); box-shadow: 0 4px 16px rgba(107,26,46,0.4); }
    .blanc { background: linear-gradient(135deg, #4a3a00, #8a6e00); box-shadow: 0 4px 16px rgba(138,110,0,0.4); }
    .rosat { background: linear-gradient(135deg, #5a1a3a, #c0406a); box-shadow: 0 4px 16px rgba(192,64,106,0.4); }
    .cava  { background: linear-gradient(135deg, #2a3a1a, #4a6a2a); box-shadow: 0 4px 16px rgba(74,106,42,0.4); }

    /* ===== VISTA LLISTA ===== */
    #view-llista { flex-direction: column; }

    #view-llista .llista-header {
      background: #4a1020;
      padding: 20px 16px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    #view-llista .llista-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .btn-afegir {
      background: #c0406a;
      border: none;
      color: white;
      font-size: 1.6rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(192,64,106,0.5);
      flex-shrink: 0;
    }
    .btn-afegir:active { transform: scale(0.92); }

    #llista-contingut {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .vi-card {
      background: #2a1018;
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.12s;
    }
    .vi-card:active { transform: scale(0.98); }

    .vi-card .vi-emoji { font-size: 2rem; flex-shrink: 0; }
    .vi-card .vi-info { flex: 1; min-width: 0; }
    .vi-card .vi-nom { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .vi-card .vi-sub { font-size: 0.8rem; color: #9a7080; margin-top: 2px; }
    .vi-card .vi-punts { font-size: 0.85rem; flex-shrink: 0; letter-spacing: -1px; }

    .buit-missatge {
      text-align: center;
      color: #5a3040;
      margin-top: 60px;
      font-size: 0.95rem;
      line-height: 1.8;
    }
    .buit-missatge .buit-emoji { font-size: 3rem; display: block; margin-bottom: 10px; }

    /* ===== VISTA FORMULARI ===== */
    #view-form { flex-direction: column; }

    #view-form .form-header {
      background: #4a1020;
      padding: 20px 16px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    #view-form .form-header h2 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    #form-contingut {
      flex: 1;
      padding: 20px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .camp { display: flex; flex-direction: column; gap: 6px; }

    .camp label {
      font-size: 0.8rem;
      color: #9a7080;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .camp input,
    .camp textarea {
      background: #2a1018;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      color: #f0e6ea;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .camp input:focus,
    .camp textarea:focus { border-color: #c0406a; }

    .camp textarea { resize: none; height: 80px; }

    /* ===== ESTRELLES (medies estrelles) ===== */
    .estreles {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    /* Contenidor de cada posició d'estrella */
    .estrela-pos {
      position: relative;
      width: 2rem;
      height: 2rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Estrella base (buida, gris) */
    .estrela-pos::before {
      content: '★';
      position: absolute;
      font-size: 1.9rem;
      color: rgba(255,200,0,0.2);
      line-height: 1;
      left: 0;
      top: 0;
    }

    /* Estrella plena (daurada, s'amaga o es mostra per sobre) */
    .estrela-pos .fill {
      position: absolute;
      top: 0;
      left: 0;
      overflow: hidden;
      width: 0%;   /* 0 = buida, 50% = mitja, 100% = plena */
      color: #ffc800;
      font-size: 1.9rem;
      line-height: 1;
      white-space: nowrap;
      transition: width 0.1s;
    }

    .estrela-pos .fill::before {
      content: '★';
    }

    /* Zones de clic (meitat esquerra i dreta) */
    .estrela-pos .esq,
    .estrela-pos .dret {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      z-index: 1;
    }
    .estrela-pos .esq { left: 0; }
    .estrela-pos .dret { right: 0; }

    .btn-guardar {
      background: linear-gradient(135deg, #8b1a2e, #c0406a);
      border: none;
      color: white;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 16px;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 8px;
      box-shadow: 0 4px 16px rgba(192,64,106,0.4);
    }
    .btn-guardar:active { transform: scale(0.97); }

    /* ===== MODAL DETALL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
      /* Centrem el modal igual que el body */
      justify-content: center;
    }
    .modal-overlay.obert { display: flex; }

    .modal-sheet {
      background: #2a1018;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 430px;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.25s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-nom { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .modal-puntuacio { font-size: 1.2rem; margin-bottom: 16px; letter-spacing: -1px; }

    .modal-fila {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 0.9rem;
    }
    .modal-fila .etiqueta { color: #9a7080; }
    .modal-fila .valor { font-weight: 600; text-align: right; max-width: 60%; }

    .modal-obs {
      margin-top: 14px;
      padding: 14px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #d0b0bc;
    }

    .modal-botons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-editar {
      flex: 1;
      background: #1a3050;
      border: 1px solid #2a5080;
      color: #80c0f0;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
    }
    .btn-editar:active { background: #2a4060; }

    .btn-eliminar {
      flex: 1;
      background: #3d0e1a;
      border: 1px solid #7a1a2e;
      color: #f0a0b0;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
    }
    .btn-eliminar:active { background: #5a1020; }

    footer {
      text-align: center;
      padding: 12px;
      font-size: 0.7rem;
      color: #5a3040;
    }
  </style>
</head>
<body>

  <!-- ========== VISTA INICI ========== -->
  <div id="view-home" class="vista activa">
    <header>
      <h1>🍷 Celler de Vins</h1>
      <p>El meu registre personal</p>
    </header>
    <main>
      <p class="titol-seccio">Selecciona el tipus de vi</p>
      <div class="grid-tipus">
        <button class="card-tipus negre" onclick="obrirLlista('negre')">
          <span class="emoji">🍷</span>
          <span class="nom">Vi Negre</span>
          <span class="comptador" id="comp-negre">0 vins</span>
        </button>
        <button class="card-tipus blanc" onclick="obrirLlista('blanc')">
          <span class="emoji">🥂</span>
          <span class="nom">Vi Blanc</span>
          <span class="comptador" id="comp-blanc">0 vins</span>
        </button>
        <button class="card-tipus rosat" onclick="obrirLlista('rosat')">
          <span class="emoji">🌸</span>
          <span class="nom">Vi Rosat</span>
          <span class="comptador" id="comp-rosat">0 vins</span>
        </button>
        <button class="card-tipus cava" onclick="obrirLlista('cava')">
          <span class="emoji">🍾</span>
          <span class="nom">Cava</span>
          <span class="comptador" id="comp-cava">0 vins</span>
        </button>
      </div>
    </main>
    <footer>Celler de Vins · Ús personal</footer>
  </div>

  <!-- ========== VISTA LLISTA ========== -->
  <div id="view-llista" class="vista">
    <div class="llista-header">
      <button class="btn-back" onclick="tornarInici()">←</button>
      <h2 id="llista-titol">Vi Negre</h2>
      <button class="btn-afegir" onclick="obrirForm(-1)">+</button>
    </div>
    <div id="llista-contingut"></div>
  </div>

  <!-- ========== VISTA FORMULARI ========== -->
  <div id="view-form" class="vista">
    <div class="form-header">
      <button class="btn-back" onclick="tornarLlista()">←</button>
      <h2 id="form-titol">Nou vi</h2>
    </div>
    <div id="form-contingut">
      <div class="camp">
        <label>Nom del vi *</label>
        <input type="text" id="f-nom" placeholder="Ex: Protos Reserva">
      </div>
      <div class="camp">
        <label>Raïm / Varietat</label>
        <input type="text" id="f-raim" placeholder="Ex: Tempranillo, Cabernet...">
      </div>
      <div class="camp">
        <label>Anyada (collita)</label>
        <input type="number" id="f-collita" placeholder="Ex: 2019" min="1900" max="2099">
      </div>
      <div class="camp">
        <label>Graduació (%)</label>
        <input type="number" id="f-graduacio" placeholder="Ex: 13.5" step="0.5" min="0" max="25">
      </div>
      <div class="camp">
        <label>Denominació d'Origen (DO)</label>
        <input type="text" id="f-do" placeholder="Ex: Ribera del Duero">
      </div>
      <div class="camp">
        <label>Bodega / Productor</label>
        <input type="text" id="f-bodega" placeholder="Ex: Bodegas Protos">
      </div>
      <div class="camp">
        <label>Puntuació</label>
        <div class="estreles" id="estreles">
          <!-- Les 5 posicions d'estrella es generen via JS -->
        </div>
      </div>
      <div class="camp">
        <label>Observacions / Notes de cata</label>
        <textarea id="f-obs" placeholder="Colors, aromes, sabor, maridatge..."></textarea>
      </div>
      <button class="btn-guardar" id="btn-guardar" onclick="guardarVi()">Guardar vi</button>
    </div>
  </div>

  <!-- ========== MODAL DETALL ========== -->
  <div id="modal-overlay" class="modal-overlay" onclick="tancarModal(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-nom" id="m-nom"></div>
      <div class="modal-puntuacio" id="m-puntuacio"></div>
      <div id="m-files"></div>
      <div class="modal-obs" id="m-obs" style="display:none"></div>
      <div class="modal-botons">
        <button class="btn-editar" onclick="obrirEdicio()">✏️ Editar</button>
        <button class="btn-eliminar" onclick="eliminarVi()">🗑 Eliminar</button>
      </div>
    </div>
  </div>

  <script>
    // ===== ESTAT GLOBAL =====
    var tipusActual = 'negre';
    var indexDetall = -1;
    var puntuacioSeleccionada = 0;
    var modeEdicio = false;

    var EMOJIS = { negre: '🍷', blanc: '🥂', rosat: '🌸', cava: '🍾' };
    var NOMS   = { negre: 'Vi Negre', blanc: 'Vi Blanc', rosat: 'Vi Rosat', cava: 'Cava' };

    // ===== ESTRELLES =====
    // Creem les 5 posicions d'estrella al DOM
    function crearEstreles() {
      var cont = document.getElementById('estreles');
      cont.innerHTML = '';
      for (var n = 1; n <= 5; n++) {
        (function(pos) {
          var div = document.createElement('div');
          div.className = 'estrela-pos';
          div.id = 'estrela-' + pos;

          var fill = document.createElement('span');
          fill.className = 'fill';
          div.appendChild(fill);

          var esq = document.createElement('span');
          esq.className = 'esq';
          esq.onclick = (function(p){ return function(){ setPuntuacio(p - 0.5); }; })(pos);
          div.appendChild(esq);

          var dret = document.createElement('span');
          dret.className = 'dret';
          dret.onclick = (function(p){ return function(){ setPuntuacio(p); }; })(pos);
          div.appendChild(dret);

          cont.appendChild(div);
        })(n);
      }
    }

    function setPuntuacio(n) {
      // Si tornem a clicar la mateixa puntuació, la resetejem
      if (n === puntuacioSeleccionada) n = 0;
      puntuacioSeleccionada = n;

      for (var i = 1; i <= 5; i++) {
        var fill = document.querySelector('#estrela-' + i + ' .fill');
        if (!fill) continue;
        if (n >= i) {
          fill.style.width = '100%';      // estrella plena
        } else if (n >= i - 0.5) {
          fill.style.width = '50%';       // mitja estrella
        } else {
          fill.style.width = '0%';        // buida
        }
      }
    }

    // Format de puntuació per mostrar (ex: ★★★★½  4.5/5)
    function formatPuntuacio(p) {
      if (!p) return 'Sense puntuació';
      var plenes = Math.floor(p);
      var mitja  = (p % 1 === 0.5);
      var text   = '★'.repeat(plenes) + (mitja ? '½' : '') + '  ' + p + '/5';
      return text;
    }

    // Format curt per a les targes de la llista
    function formatPuntuacioCurt(p) {
      if (!p) return '—';
      var plenes = Math.floor(p);
      var mitja  = (p % 1 === 0.5);
      return '★'.repeat(plenes) + (mitja ? '½' : '');
    }

    // ===== NAVEGACIÓ =====
    function mostrarVista(id) {
      document.querySelectorAll('.vista').forEach(function(v){ v.classList.remove('activa'); });
      document.getElementById(id).classList.add('activa');
      window.scrollTo(0, 0);
    }

    function obrirLlista(tipus) {
      tipusActual = tipus;
      document.getElementById('llista-titol').textContent = EMOJIS[tipus] + ' ' + NOMS[tipus];
      renderLlista();
      mostrarVista('view-llista');
    }

    function tornarInici() {
      actualitzarComptadors();
      mostrarVista('view-home');
    }

    function obrirForm(index) {
      modeEdicio = (index >= 0);
      indexDetall = index;

      if (modeEdicio) {
        var vins = getVins();
        var v = vins[index];
        document.getElementById('form-titol').textContent = '✏️ Editar vi';
        document.getElementById('btn-guardar').textContent = 'Guardar canvis';
        document.getElementById('f-nom').value       = v.nom        || '';
        document.getElementById('f-raim').value      = v.raim       || '';
        document.getElementById('f-collita').value   = v.collita    || '';
        document.getElementById('f-graduacio').value = v.graduacio  || '';
        document.getElementById('f-do').value        = v.do         || '';
        document.getElementById('f-bodega').value    = v.bodega     || '';
        document.getElementById('f-obs').value       = v.observacions || '';
        setPuntuacio(v.puntuacio || 0);
      } else {
        document.getElementById('form-titol').textContent = 'Nou ' + NOMS[tipusActual].toLowerCase();
        document.getElementById('btn-guardar').textContent = 'Guardar vi';
        ['f-nom','f-raim','f-collita','f-graduacio','f-do','f-bodega','f-obs'].forEach(function(id){
          document.getElementById(id).value = '';
        });
        setPuntuacio(0);
      }

      document.getElementById('modal-overlay').classList.remove('obert');
      mostrarVista('view-form');
    }

    function obrirEdicio() { obrirForm(indexDetall); }

    function tornarLlista() {
      renderLlista();
      mostrarVista('view-llista');
    }

    // ===== DADES =====
    function getVins() {
      return JSON.parse(localStorage.getItem('vins_' + tipusActual) || '[]');
    }

    function setVins(arr) {
      localStorage.setItem('vins_' + tipusActual, JSON.stringify(arr));
    }

    // ===== LLISTA =====
    function renderLlista() {
      var vins = getVins();
      var cont = document.getElementById('llista-contingut');

      if (vins.length === 0) {
        cont.innerHTML = '<div class="buit-missatge"><span class="buit-emoji">' + EMOJIS[tipusActual] + '</span>Encara no hi ha cap vi aquí.<br>Prem <strong>+</strong> per afegir-ne un!</div>';
        return;
      }

      cont.innerHTML = vins.map(function(v, i) {
        var punts = formatPuntuacioCurt(v.puntuacio);
        var sub = [v.bodega, v.do, v.collita ? 'Anyada ' + v.collita : ''].filter(Boolean).join(' · ');
        return '<div class="vi-card" onclick="obrirDetall(' + i + ')">'
          + '<span class="vi-emoji">' + EMOJIS[tipusActual] + '</span>'
          + '<div class="vi-info">'
          + '<div class="vi-nom">' + v.nom + '</div>'
          + (sub ? '<div class="vi-sub">' + sub + '</div>' : '')
          + '</div>'
          + '<span class="vi-punts">' + punts + '</span>'
          + '</div>';
      }).join('');
    }

    // ===== DETALL / MODAL =====
    function obrirDetall(index) {
      var vins = getVins();
      var v = vins[index];
      indexDetall = index;

      document.getElementById('m-nom').textContent = v.nom;
      document.getElementById('m-puntuacio').textContent = formatPuntuacio(v.puntuacio);

      var files = [
        ['Tipus',     NOMS[tipusActual]],
        ['Raïm',      v.raim],
        ['Anyada',    v.collita],
        ['Graduació', v.graduacio ? v.graduacio + '%' : ''],
        ['D.O.',      v.do],
        ['Bodega',    v.bodega],
      ].filter(function(f){ return f[1]; });

      document.getElementById('m-files').innerHTML = files.map(function(f){
        return '<div class="modal-fila"><span class="etiqueta">' + f[0] + '</span><span class="valor">' + f[1] + '</span></div>';
      }).join('');

      var obsEl = document.getElementById('m-obs');
      if (v.observacions) {
        obsEl.textContent = v.observacions;
        obsEl.style.display = 'block';
      } else {
        obsEl.style.display = 'none';
      }

      document.getElementById('modal-overlay').classList.add('obert');
    }

    function tancarModal(event) {
      if (event.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('obert');
      }
    }

    function eliminarVi() {
      if (!confirm('Segur que vols eliminar aquest vi?')) return;
      var vins = getVins();
      vins.splice(indexDetall, 1);
      setVins(vins);
      document.getElementById('modal-overlay').classList.remove('obert');
      renderLlista();
    }

    // ===== FORMULARI =====
    function guardarVi() {
      var nom = document.getElementById('f-nom').value.trim();
      if (!nom) {
        alert('El nom del vi és obligatori.');
        document.getElementById('f-nom').focus();
        return;
      }

      var vins = getVins();

      var viData = {
        nom:          nom,
        raim:         document.getElementById('f-raim').value.trim(),
        collita:      document.getElementById('f-collita').value.trim(),
        graduacio:    document.getElementById('f-graduacio').value.trim(),
        do:           document.getElementById('f-do').value.trim(),
        bodega:       document.getElementById('f-bodega').value.trim(),
        puntuacio:    puntuacioSeleccionada,
        observacions: document.getElementById('f-obs').value.trim()
      };

      if (modeEdicio) {
        viData.id = vins[indexDetall].id;
        vins[indexDetall] = viData;
      } else {
        viData.id = Date.now();
        vins.unshift(viData);
      }

      setVins(vins);
      tornarLlista();
    }

    // ===== COMPTADORS INICI =====
    function actualitzarComptadors() {
      ['negre', 'blanc', 'rosat', 'cava'].forEach(function(t) {
        var vins = JSON.parse(localStorage.getItem('vins_' + t) || '[]');
        var el = document.getElementById('comp-' + t);
        if (el) el.textContent = vins.length === 1 ? '1 vi' : vins.length + ' vins';
      });
    }

    // ===== SERVICE WORKER =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
          .catch(function(err){ console.error('SW error:', err); });
      });
    }

    // ===== INICI =====
    crearEstreles();
    actualitzarComptadors();
  </script>

</body>
</html>
